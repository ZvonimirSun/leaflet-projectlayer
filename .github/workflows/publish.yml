name: Node.js Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  MAIN_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          cache: true
          run_install: true

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Publish
        if: github.event_name == 'push' && github.ref_name == env.MAIN_BRANCH
        run: pnpm publish --access public
